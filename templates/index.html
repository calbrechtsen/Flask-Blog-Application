{% extends "base.html" %}

{% block content %}

<h1 class="page-title">All Blog Posts</h1>

{% if posts %}
{% for post in posts %}

<article class="post-card">

    <h2 class="post-title">
        <a href="{{ url_for('post_detail', post_id=post.id) }}">
            {{ post.title }}
        </a>
    </h2>

    <small class="post-meta">
        {{ post.created_at.strftime("%Y-%m-%d %H:%M") }}
    </small>

    <p class="post-preview">
        {{ post.body[:200] }}...
    </p>

    <a href="{{ url_for('post_detail', post_id=post.id) }}" class="read-more">
        Read more →
    </a>

</article>

{% endfor %}
{% else %}
<p>No posts yet.</p>
{% endif %}

{% endblock %}
