{% extends "base.html" %}

{% block content %}

<h1>All Blog Posts</h1>

{% if posts %}
{% for post in posts %}
<div class="post">
    <h2>
        <a href="/post/{{ post.id }}">
            {{ post.title }}
        </a>
    </h2>

    <small>
        {{ post.created_at.strftime("%Y-%m-%d %H:%M") }}
    </small>

    <p>
        {{ post.body[:200] }}...
    </p>
</div>
{% endfor %}
{% else %}
<p>No posts yet.</p>
{% endif %}

{% endblock %}
