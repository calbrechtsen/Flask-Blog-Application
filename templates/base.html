<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <meta charset="UTF-8">
    <title>Flask Blog</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: auto;
            padding: 20px;
            background: #6cbe1bf7;
        }

        nav {
            margin-bottom: 20px;
        }

        nav a {
            margin-right: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        .post {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 6px;
        }

        textarea {
            width: 100%;
            height: 150px;
        }

        input,
        textarea {
            margin-bottom: 10px;
            padding: 8px;
        }
    </style>
</head>

<body>

    <nav>
        <a href="/">Home</a>
        <a href="/post/new">New Post</a>
    </nav>

    <hr>

    {% block content %}{% endblock %}

</body>

</html>
